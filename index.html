<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ukraine NS · Newsky Demand</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0b1220; color: #e2e8f0;
  }
  #root { min-height: 100vh; }
  .loading {
    display: flex; align-items: center; justify-content: center;
    height: 100vh; color: #94a3b8; font-size: 18px; flex-direction: column; gap: 12px;
  }
  .err { color: #f87171; }

  #top { display: flex; height: 70vh; }
  #map { flex: 1; }
  #side {
    width: 420px; background: #0f172a; border-left: 1px solid #1e293b;
    overflow-y: auto; padding: 16px;
  }
  #side h1 { font-size: 15px; margin: 0 0 4px; color: #94a3b8; font-weight: 500; }
  #side h2 { font-size: 20px; margin: 0 0 2px; color: #f1f5f9; }
  #side .meta { color: #64748b; font-size: 12px; margin-bottom: 16px; }
  #side h3 {
    font-size: 12px; text-transform: uppercase; letter-spacing: 1px;
    color: #94a3b8; margin: 20px 0 6px; border-bottom: 1px solid #1e293b;
    padding-bottom: 4px;
  }
  .tabs { display: flex; gap: 0; margin: 12px 0 8px; }
  .tabs button {
    flex: 1; padding: 8px; background: #1e293b; color: #94a3b8; border: none;
    cursor: pointer; font-size: 13px; font-weight: 500;
  }
  .tabs button.active { background: #334155; color: #f1f5f9; }
  .tabs button:first-child { border-radius: 6px 0 0 6px; }
  .tabs button:last-child { border-radius: 0 6px 6px 0; }
  .legend {
    position: absolute; top: 12px; right: 432px; background: rgba(15,23,42,0.9);
    padding: 10px 14px; border-radius: 8px; font-size: 12px;
    border: 1px solid #1e293b; z-index: 400;
  }
  .legend div { display: flex; align-items: center; gap: 8px; margin: 2px 0; }
  .legend .dot { width: 10px; height: 10px; border-radius: 50%; }
  .route { padding: 6px 0; font-size: 12px; border-top: 1px solid #1e293b; }
  .route .head { color: #e2e8f0; font-weight: 500; }
  .route .sub { color: #94a3b8; margin-top: 2px; font-size: 11px; }
  .empty-state { color: #64748b; font-size: 13px; text-align: center; margin-top: 40px; }

  #bottom {
    border-top: 2px solid #1e293b; background: #0f172a;
    padding: 16px; min-height: 30vh;
  }
  .table-tabs {
    display: flex; gap: 4px; margin-bottom: 12px; border-bottom: 1px solid #1e293b;
  }
  .table-tabs button {
    padding: 10px 20px; background: transparent; color: #94a3b8; border: none;
    cursor: pointer; font-size: 14px; font-weight: 500;
    border-bottom: 2px solid transparent; margin-bottom: -1px;
  }
  .table-tabs button.active { color: #f1f5f9; border-bottom-color: #f97316; }
  .table-tabs .count { color: #64748b; font-size: 11px; margin-left: 6px; }

  .controls {
    display: flex; gap: 12px; margin-bottom: 12px; align-items: center; flex-wrap: wrap;
  }
  .controls input, .controls select {
    background: #1e293b; color: #e2e8f0; border: 1px solid #334155;
    padding: 6px 10px; border-radius: 4px; font-size: 13px; font-family: inherit;
  }
  .controls input { min-width: 180px; }
  .controls label { color: #94a3b8; font-size: 12px; display: flex; align-items: center; gap: 6px; }
  .controls .chip {
    background: #334155; color: #f1f5f9; padding: 4px 10px; border-radius: 12px;
    font-size: 11px; cursor: pointer; border: 1px solid transparent;
  }
  .controls .chip.active { background: #f97316; color: #0b1220; font-weight: 600; }

  table { width: 100%; border-collapse: collapse; font-size: 12px; font-variant-numeric: tabular-nums; }
  thead th {
    background: #1e293b; color: #cbd5e1; padding: 8px; text-align: left;
    border-bottom: 1px solid #334155; cursor: pointer; user-select: none;
    position: sticky; top: 0; font-weight: 500; font-size: 11px;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  thead th:hover { background: #334155; }
  thead th.sorted-asc::after { content: ' ▲'; color: #f97316; }
  thead th.sorted-desc::after { content: ' ▼'; color: #f97316; }
  tbody td { padding: 6px 8px; border-bottom: 1px solid #1e293b; }
  tbody tr:hover { background: #1e293b; }
  tbody tr.clickable { cursor: pointer; }
  tbody tr.clickable:hover { background: #273548; }
  tbody tr.ua td:first-child { color: #fca5a5; font-weight: 600; }
  .icao { font-family: 'Courier New', monospace; }
  .icao-link { cursor: pointer; }
  .icao-link:hover { text-decoration: underline; color: #fb923c; }
  .num { text-align: right; }
  .scroll-wrap { max-height: 60vh; overflow: auto; border: 1px solid #1e293b; border-radius: 6px; }
  .pill {
    display: inline-block; padding: 1px 8px; border-radius: 10px;
    font-size: 10px; font-weight: 600;
  }
  .pill-pax { background: #1e3a8a; color: #bfdbfe; }
  .pill-cargo { background: #78350f; color: #fed7aa; }
  .pill-ua { background: #7f1d1d; color: #fecaca; }
  .mx { text-align: right; font-family: 'Courier New', monospace; }
  .mx-hot1 { background: rgba(249, 115, 22, 0.2); }
  .mx-hot2 { background: rgba(249, 115, 22, 0.4); color: #0b1220; font-weight: 600; }
  .mx-hot3 { background: rgba(249, 115, 22, 0.65); color: #0b1220; font-weight: 700; }
  .mx-cold1 { background: rgba(59, 130, 246, 0.2); }
  .mx-cold2 { background: rgba(59, 130, 246, 0.4); color: #0b1220; }
  .mx-def1 { background: rgba(239, 68, 68, 0.25); }
  .mx-def2 { background: rgba(239, 68, 68, 0.5); color: #fef2f2; font-weight: 600; }
  .mx-def3 { background: rgba(239, 68, 68, 0.75); color: #fef2f2; font-weight: 700; }
</style>
</head>
<body>
<div id="root"><div class="loading">⏳ Завантажую дані...</div></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel" data-presets="env,react">
const { useState, useEffect, useRef, useMemo } = React;

const SECTOR_SHORT = ["N↑","NNE↗","ENE↗","E→","ESE↘","SSE↘","S↓","SSW↙","WSW↙","W←","WNW↖","NNW↖"];
const SECTOR_LABELS = ["N ⬆️","NNE ↗️","ENE ↗️","E ➡️","ESE ↘️","SSE ↘️","S ⬇️","SSW ↙️","WSW ↙️","W ⬅️","WNW ↖️","NNW ↖️"];
const w = (n) => Math.ceil(n / 4);

const UA_ROUTE_THRESHOLD_PAX = 180;
const UA_ROUTE_THRESHOLD_CARGO = 12;

function expandSnapshot(raw, prevRaw) {
  // Build a quick lookup of previous current values:
  // prevByIcao[icao][kind][sector_idx] = previous_current
  const prevByIcao = {};
  if (prevRaw) {
    prevRaw.airports.forEach(a => {
      prevByIcao[a.icao] = {};
      ['pax', 'cargo'].forEach(kind => {
        const block = a[kind];
        if (block && block.sectors) {
          prevByIcao[a.icao][kind] = block.sectors.map(s => s.c);
        }
      });
    });
  }

  const airports = raw.airports.map(a => {
    const out = { ...a };
    ['pax', 'cargo'].forEach(kind => {
      const block = a[kind];
      if (!block || !block.sectors) return;
      const prev = prevByIcao[a.icao]?.[kind];
      const expanded = block.sectors.map((s, i) => {
        const def = Math.max(0, s.n - s.c);
        const prevC = prev ? prev[i] : null;
        const delta = (prevC != null) ? (s.c - prevC) : null;
        return {
          sector: i, label: SECTOR_LABELS[i], short: SECTOR_SHORT[i],
          current: s.c, normal: s.n, bias: s.b,
          deficit: def,
          current_w: w(s.c), normal_w: w(s.n), deficit_w: w(def),
          prev_current: prevC,
          prev_current_w: prevC != null ? w(prevC) : null,
          delta: delta,
          delta_w: delta != null ? Math.round(delta / 4) : null,
        };
      });
      out[kind] = { sectors: expanded };
    });
    return out;
  });
  const byIcao = {};
  airports.forEach(a => byIcao[a.icao] = a);
  const routes = raw.routes.map(r => {
    const fa = byIcao[r.from], ta = byIcao[r.to];
    return {
      ...r,
      sector: r.sec,
      sector_label: SECTOR_LABELS[r.sec],
      distance_nm: r.nm,
      outbound_current_w: r.out_w,
      outbound_bias: r.out_b,
      backhaul_current_w: r.back_w,
      from_name: fa?.name || r.from, from_ua: fa?.is_ua || false,
      to_name: ta?.name || r.to,     to_ua: ta?.is_ua || false,
    };
  });
  // Compute hours-elapsed from prev for the UI label
  let hoursElapsed = null;
  if (prevRaw && raw.generated_at && prevRaw.generated_at) {
    // Format from python: "%Y-%m-%d %H:%M UTC"
    const parseUtc = (s) => {
      const [date, time] = s.replace(' UTC', '').split(' ');
      return Date.parse(date + 'T' + time + ':00Z');
    };
    const t1 = parseUtc(raw.generated_at);
    const t0 = parseUtc(prevRaw.generated_at);
    if (!isNaN(t1) && !isNaN(t0)) {
      hoursElapsed = (t1 - t0) / 1000 / 3600;
    }
  }
  return {
    airports, routes, byIcao,
    generated_at: raw.generated_at,
    prev_generated_at: prevRaw?.generated_at,
    hours_elapsed: hoursElapsed,
  };
}

// ---------------- Map + Sidebar ----------------
function MapView({ data, selected, onSelect, mapRef }) {
  const mapDiv = useRef(null);
  const markersRef = useRef([]);

  useEffect(() => {
    if (!mapDiv.current || mapRef.current) return;
    const map = L.map(mapDiv.current).setView([49.0, 28.0], 5);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      attribution: '© OpenStreetMap contributors © CARTO', maxZoom: 18,
    }).addTo(map);
    mapRef.current = map;
  }, []);

  useEffect(() => {
    const map = mapRef.current;
    if (!map) return;
    markersRef.current.forEach(m => map.removeLayer(m));
    markersRef.current = [];
    data.airports.forEach(a => {
      const size = a.is_ua ? 8 : 5;
      const color = a.is_ua ? '#ef4444' : '#3b82f6';
      const marker = L.circleMarker([a.lat, a.lon], {
        radius: size, fillColor: color, color: '#0b1220',
        weight: 1, fillOpacity: 0.9,
      }).addTo(map);
      marker.bindTooltip(`<b>${a.icao}</b> ${a.name}`, { direction: 'top' });
      marker.on('click', () => onSelect(a.icao));
      markersRef.current.push(marker);
    });
  }, [data]);

  return <div ref={mapDiv} id="map"></div>;
}

function RadarChart({ airport, kind }) {
  const canvasRef = useRef(null);
  const chartRef = useRef(null);
  useEffect(() => {
    if (!canvasRef.current) return;
    if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; }
    const sectors = airport[kind]?.sectors;
    if (!sectors) return;
    chartRef.current = new Chart(canvasRef.current.getContext('2d'), {
      type: 'radar',
      data: {
        labels: sectors.map(s => s.short),
        datasets: [
          { label: 'Норма', data: sectors.map(s => s.normal_w),
            backgroundColor: 'rgba(148,163,184,0.08)', borderColor: 'rgba(148,163,184,0.6)',
            borderWidth: 1, borderDash: [4, 4], pointRadius: 0 },
          ...(sectors[0].prev_current_w != null ? [{
            label: 'Було',
            data: sectors.map(s => s.prev_current_w),
            backgroundColor: 'rgba(56,189,248,0.05)',
            borderColor: 'rgba(56,189,248,0.5)',
            borderWidth: 1.5, borderDash: [2, 3], pointRadius: 0,
          }] : []),
          { label: 'Зараз', data: sectors.map(s => s.current_w),
            backgroundColor: 'rgba(249,115,22,0.25)', borderColor: 'rgba(249,115,22,0.9)',
            borderWidth: 2, pointBackgroundColor: 'rgba(249,115,22,1)',
            pointRadius: 3, pointHoverRadius: 6 },
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: { callbacks: { label: (ctx) => {
            const unit = kind === 'pax' ? '' : 'т';
            return `${ctx.dataset.label}: ${ctx.parsed.r}${unit}/тижд`;
          }}}
        },
        scales: { r: {
          beginAtZero: true,
          grid: { color: 'rgba(148,163,184,0.15)' },
          angleLines: { color: 'rgba(148,163,184,0.2)' },
          pointLabels: { color: '#cbd5e1', font: { size: 11 } },
          ticks: { display: false, backdropColor: 'transparent' },
        }},
      }
    });
    return () => { if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; } };
  }, [airport, kind]);
  return <canvas ref={canvasRef}></canvas>;
}

function Sidebar({ data, selectedIcao, onSelect }) {
  const [kind, setKind] = useState('pax');
  if (!selectedIcao) {
    return (
      <div id="side">
        <h1>📊 Ukraine NS · Newsky Demand</h1>
        <div className="meta">
          Знімок: {data.generated_at}
          {data.prev_generated_at && (
            <span style={{ marginLeft: 6, color: '#64748b' }}>
              (попередній: {data.prev_generated_at})
            </span>
          )}
        </div>
        <div className="empty-state">Клікни на аеропорт на карті<br/>щоб побачити деталі</div>
      </div>
    );
  }
  const a = data.byIcao[selectedIcao];
  if (!a) return null;
  return (
    <div id="side">
      <h1>{a.is_ua ? '🇺🇦' : '🌍'} {a.icao}</h1>
      <h2>{a.name}</h2>
      <div className="meta">{a.city}{a.country ? `, ${a.country}` : ''} · {a.lat.toFixed(2)}, {a.lon.toFixed(2)}</div>
      <div className="tabs">
        <button className={kind === 'pax' ? 'active' : ''} onClick={() => setKind('pax')}>👨‍💼 Pax</button>
        <button className={kind === 'cargo' ? 'active' : ''} onClick={() => setKind('cargo')}>📦 Cargo</button>
      </div>
      <h3>Попит по секторах</h3>
      <div style={{ position: 'relative', height: 280, margin: '8px 0 12px' }}>
        <RadarChart airport={a} kind={kind} />
      </div>
      <div className="meta" style={{ textAlign: 'center', fontSize: 11, marginBottom: 12 }}>
        🟧 поточний · ⚪ норма
        {data.hours_elapsed != null && ' · 🔵 було'}
      </div>
      <DeltaTable airport={a} kind={kind} hoursElapsed={data.hours_elapsed} />
      {a.is_ua ? <UaRoutes airport={a} kind={kind} routes={data.routes} />
              : <ForeignRoutes airport={a} kind={kind} routes={data.routes} />}
    </div>
  );
}

function DeltaTable({ airport, kind, hoursElapsed }) {
  const sectors = airport[kind]?.sectors;
  if (!sectors || sectors[0].delta_w == null) return null;
  // Show only sectors where delta != 0, sorted by abs(delta) desc
  const changed = sectors
    .map((s, i) => ({ ...s, _i: i }))
    .filter(s => s.delta_w !== 0)
    .sort((a, b) => Math.abs(b.delta_w) - Math.abs(a.delta_w))
    .slice(0, 8);
  if (!changed.length) return null;
  const fmtElapsed = (h) => {
    if (h == null) return '';
    if (h < 1) return `${Math.round(h * 60)}хв`;
    if (h < 48) return `${h.toFixed(1)}год`;
    return `${(h / 24).toFixed(1)}дн`;
  };
  const unit = kind === 'pax' ? '' : 'т';
  return <>
    <h3>Δ за {fmtElapsed(hoursElapsed)} (топ-8)</h3>
    {changed.map(s => {
      const sign = s.delta_w > 0 ? '+' : '';
      const color = s.delta_w > 0 ? '#4ade80' : '#f87171';
      return (
        <div key={s._i} className="route" style={{ display: 'flex', justifyContent: 'space-between' }}>
          <span>{s.label}</span>
          <span style={{ color, fontWeight: 600 }}>
            {sign}{s.delta_w}{unit} <span style={{ color: '#64748b', fontWeight: 400, fontSize: 11 }}>
              ({s.prev_current_w}→{s.current_w})
            </span>
          </span>
        </div>
      );
    })}
  </>;
}

function UaRoutes({ airport, kind, routes }) {
  const out = routes.filter(r => r.from === airport.icao && r.kind === kind)
    .sort((x, y) => y.outbound_current_w - x.outbound_current_w).slice(0, 8);
  if (!out.length) return null;
  const icon = kind === 'pax' ? '👨‍💼' : '📦';
  return (<>
    <h3>🛫 Вихідні рейси</h3>
    {out.map((r, i) => (
      <div key={i} className="route">
        <div className="head">→ <b>{r.to}</b> {r.sector_label} · {r.distance_nm}nm</div>
        <div className="sub">✈️ {r.outbound_current_w} {icon} · {r.backhaul_current_w > 0
          ? `🔁 назад ${r.backhaul_current_w}` : '❄️ зворотка порожня'}</div>
      </div>
    ))}
  </>);
}

function ForeignRoutes({ airport, kind, routes }) {
  const threshold = kind === 'pax' ? UA_ROUTE_THRESHOLD_PAX : UA_ROUTE_THRESHOLD_CARGO;
  const unit = kind === 'pax' ? '' : 'т';
  const icon = kind === 'pax' ? '👨‍💼' : '📦';
  const candidates = routes.filter(r => r.from === airport.icao && r.kind === kind
                                         && r.to_ua && r.outbound_current_w >= threshold);
  if (!candidates.length) {
    return <div className="empty-state" style={{ marginTop: 20 }}>
      Немає UA аеропортів з попитом ≥ {threshold}{unit}/тижд<br/>
      з <b>{airport.icao}</b>
    </div>;
  }
  const bySector = {};
  candidates.forEach(c => {
    if (!bySector[c.sector_label]) bySector[c.sector_label] = { out_w: c.outbound_current_w, targets: [] };
    bySector[c.sector_label].targets.push(c);
  });
  const sectors = Object.keys(bySector).sort((a, b) => bySector[b].out_w - bySector[a].out_w);
  return (<>
    <h3>🎯 Потенційні рейси в UA</h3>
    <div className="meta" style={{ marginBottom: 8 }}>Фільтр: ≥ {threshold}{unit}/тижд</div>
    {sectors.map(sec => {
      const g = bySector[sec];
      g.targets.sort((x, y) => x.distance_nm - y.distance_nm);
      return <div key={sec} className="route">
        <div className="head">{sec} — {g.out_w} {icon}/тижд з {airport.icao}</div>
        {g.targets.map((t, i) => (
          <div key={i} className="sub" style={{ marginLeft: 10 }}>
            → <b>{t.to}</b> {t.to_name} · {t.distance_nm}nm
            {t.backhaul_current_w > 0 && ` · 🔁 назад ${t.backhaul_current_w}${unit}`}
          </div>
        ))}
      </div>;
    })}
  </>);
}

// ---------------- Backhaul tab ----------------
function BackhaulTab({ data, onSelect }) {
  const [kind, setKind] = useState('pax');
  const [minVolume, setMinVolume] = useState(180);
  const [search, setSearch] = useState('');
  const [backhaulOnly, setBackhaulOnly] = useState(false);

  const rows = useMemo(() => {
    const bySrcKindSec = {};
    data.routes.forEach(r => {
      if (r.from_ua) return;
      if (!r.to_ua) return;
      const key = `${r.from}|${r.kind}|${r.sector}`;
      if (!bySrcKindSec[key]) {
        bySrcKindSec[key] = {
          from: r.from, from_name: r.from_name,
          kind: r.kind, sector: r.sector, sector_label: r.sector_label,
          out_w: r.outbound_current_w, bias: r.outbound_bias,
          targets: [],
        };
      }
      bySrcKindSec[key].targets.push({
        to: r.to, to_name: r.to_name,
        dist_nm: r.distance_nm, back_w: r.backhaul_current_w,
      });
    });
    return Object.values(bySrcKindSec).map(row => {
      row.targets.sort((a, b) => a.dist_nm - b.dist_nm);
      row.best_back_w = Math.max(0, ...row.targets.map(t => t.back_w));
      return row;
    });
  }, [data]);

  const filtered = useMemo(() => rows.filter(r => {
    if (r.kind !== kind) return false;
    if (r.out_w < minVolume) return false;
    if (backhaulOnly && r.best_back_w < 50) return false;
    if (search) {
      const hay = `${r.from} ${r.from_name}`.toLowerCase();
      if (!hay.includes(search.toLowerCase())) return false;
    }
    return true;
  }).sort((a, b) => b.out_w - a.out_w), [rows, kind, minVolume, backhaulOnly, search]);

  const icon = kind === 'pax' ? '👨‍💼' : '📦';
  const unit = kind === 'pax' ? '' : 'т';

  return (
    <div>
      <div className="controls">
        <label>Kind:
          <span className={`chip ${kind === 'pax' ? 'active' : ''}`}
                onClick={() => { setKind('pax'); setMinVolume(180); }}>Pax</span>
          <span className={`chip ${kind === 'cargo' ? 'active' : ''}`}
                onClick={() => { setKind('cargo'); setMinVolume(12); }}>Cargo</span>
        </label>
        <label>Min volume/тижд:
          <input type="number" value={minVolume}
                 onChange={e => setMinVolume(parseInt(e.target.value) || 0)}
                 style={{ width: 70 }}/>
        </label>
        <input type="text" placeholder="🔍 ICAO або назва"
               value={search} onChange={e => setSearch(e.target.value)}/>
        <label>
          <input type="checkbox" checked={backhaulOnly}
                 onChange={e => setBackhaulOnly(e.target.checked)}/>
          Тільки з гарячою зворот.
        </label>
        <span style={{ color: '#64748b', fontSize: 11 }}>({filtered.length})</span>
      </div>
      <div className="meta" style={{ color: '#64748b', fontSize: 12, marginBottom: 8 }}>
        Іноземні аеропорти де сектор у бік UA має попит. Сортуй по «Out/w».
      </div>
      <div className="scroll-wrap">
        <table>
          <thead><tr>
            <th>From</th><th>Name</th><th>Sector</th>
            <th className="num">Out/w</th><th className="num">Bias</th>
            <th>UA цілі</th>
            <th className="num">Best back/w</th>
          </tr></thead>
          <tbody>
            {filtered.map((r, i) => (
              <tr key={i} className="clickable" onClick={(e) => {
                const link = e.target.closest('.icao-link');
                onSelect(link ? link.dataset.icao : r.from);
              }}>
                <td className="icao">{r.from}</td>
                <td>{r.from_name}</td>
                <td>{r.sector_label}</td>
                <td className="num"><b style={{ color: '#fb923c' }}>{r.out_w}</b> {icon}</td>
                <td className="num">{r.bias.toFixed(2)}</td>
                <td style={{ fontSize: 11 }}>
                  {r.targets.slice(0, 5).map((t, j) => (
                    <span key={j}>
                      <span className="icao icao-link" data-icao={t.to}>{t.to}</span>
                      ({t.dist_nm}nm{t.back_w >= 50 && <span style={{ color: '#4ade80' }}> 🔁{t.back_w}{unit}</span>})
                      {j < Math.min(4, r.targets.length - 1) && ' · '}
                    </span>
                  ))}
                  {r.targets.length > 5 && <span style={{ color: '#64748b' }}> +{r.targets.length - 5}</span>}
                </td>
                <td className="num">
                  {r.best_back_w >= 50 ? <span style={{ color: '#4ade80' }}>{r.best_back_w}</span>
                                       : (r.best_back_w > 0 ? r.best_back_w : '—')}
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ---------------- Matrix tab ----------------
function MatrixTab({ data }) {
  const [kind, setKind] = useState('pax');
  const [mode, setMode] = useState('current');
  const [uaOnly, setUaOnly] = useState(true);
  const [search, setSearch] = useState('');

  const rows = useMemo(() => data.airports.filter(a => {
    if (uaOnly && !a.is_ua) return false;
    if (search) {
      const hay = `${a.icao} ${a.name}`.toLowerCase();
      if (!hay.includes(search.toLowerCase())) return false;
    }
    return a[kind]?.sectors;
  }), [data, uaOnly, search, kind]);

  const maxDef = Math.max(1, ...rows.flatMap(a => a[kind].sectors.map(s => s.deficit_w)));

  const cellClass = (val, sector) => {
    if (val <= 0) return '';
    if (mode === 'deficit') {
      const pct = val / maxDef;
      if (pct >= 0.6) return 'mx-def3';
      if (pct >= 0.3) return 'mx-def2';
      if (pct >= 0.1) return 'mx-def1';
      return '';
    }
    const ratio = sector.normal > 0 ? sector.current / sector.normal : 1;
    if (ratio >= 1.5) return 'mx-hot3';
    if (ratio >= 1.2) return 'mx-hot2';
    if (ratio >= 1.05) return 'mx-hot1';
    if (ratio <= 0.5) return 'mx-cold2';
    if (ratio <= 0.8) return 'mx-cold1';
    return '';
  };

  return (
    <div>
      <div className="controls">
        <label>Kind:
          <span className={`chip ${kind === 'pax' ? 'active' : ''}`} onClick={() => setKind('pax')}>Pax</span>
          <span className={`chip ${kind === 'cargo' ? 'active' : ''}`} onClick={() => setKind('cargo')}>Cargo</span>
        </label>
        <label>Показник:
          <span className={`chip ${mode === 'current' ? 'active' : ''}`} onClick={() => setMode('current')}>Current/тижд</span>
          <span className={`chip ${mode === 'deficit' ? 'active' : ''}`} onClick={() => setMode('deficit')}>Дефіцит/тижд</span>
        </label>
        <label><input type="checkbox" checked={uaOnly} onChange={e => setUaOnly(e.target.checked)}/> Тільки UA</label>
        <input type="text" placeholder="🔍 ICAO або назва" value={search} onChange={e => setSearch(e.target.value)}/>
        <span style={{ color: '#64748b', fontSize: 11 }}>({rows.length})</span>
      </div>
      <div className="scroll-wrap">
        <table>
          <thead><tr>
            <th>ICAO</th><th>Name</th>
            {SECTOR_SHORT.map(s => <th key={s} className="num">{s}</th>)}
            <th className="num">Σ</th>
          </tr></thead>
          <tbody>
            {rows.map(a => {
              let total = 0;
              return <tr key={a.icao} className={a.is_ua ? 'ua' : ''}>
                <td className="icao"><b>{a.icao}</b></td>
                <td>{a.name}</td>
                {a[kind].sectors.map((s, i) => {
                  const val = mode === 'current' ? s.current_w : s.deficit_w;
                  total += val;
                  return <td key={i} className={`mx ${cellClass(val, s)}`}>{val > 0 ? val : ''}</td>;
                })}
                <td className="mx"><b>{total || ''}</b></td>
              </tr>;
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ---------------- App ----------------
function App() {
  const [raw, setRaw] = useState(null);
  const [prevRaw, setPrevRaw] = useState(null);
  const [error, setError] = useState(null);
  const [selectedIcao, setSelectedIcao] = useState(null);
  const [activeTab, setActiveTab] = useState('backhaul');
  const mapRef = useRef(null);

  useEffect(() => {
    const ts = Date.now();
    fetch('snapshot.json?ts=' + ts)
      .then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); })
      .then(setRaw)
      .catch(e => setError(e.message));
    // Previous snapshot is optional — silently ignore 404
    fetch('snapshot_prev.json?ts=' + ts)
      .then(r => r.ok ? r.json() : null)
      .then(setPrevRaw)
      .catch(() => setPrevRaw(null));
  }, []);

  const data = useMemo(() => raw ? expandSnapshot(raw, prevRaw) : null, [raw, prevRaw]);

  if (error) return <div className="loading err">❌ {error}<br/>
    <small>snapshot.json не знайдено? Запусти newsky_export.py локально й закоміть.</small></div>;
  if (!data) return null;

  const handleSelect = (icao) => {
    setSelectedIcao(icao);
    window.scrollTo({ top: 0, behavior: 'smooth' });
    const a = data.byIcao[icao];
    if (a && mapRef.current) {
      mapRef.current.flyTo([a.lat, a.lon], Math.max(mapRef.current.getZoom(), 5), { duration: 0.6 });
    }
  };

  return <>
    <div id="top">
      <MapView data={data} selected={selectedIcao} onSelect={handleSelect} mapRef={mapRef} />
      <Sidebar data={data} selectedIcao={selectedIcao} onSelect={handleSelect} />
    </div>
    <div className="legend">
      <div><span className="dot" style={{ background: '#ef4444' }}></span> UA</div>
      <div><span className="dot" style={{ background: '#3b82f6' }}></span> Іноземні</div>
    </div>
    <div id="bottom">
      <div className="table-tabs">
        <button className={activeTab === 'backhaul' ? 'active' : ''}
                onClick={() => setActiveTab('backhaul')}>🎯 Backhaul</button>
        <button className={activeTab === 'matrix' ? 'active' : ''}
                onClick={() => setActiveTab('matrix')}>📊 Matrix</button>
      </div>
      {activeTab === 'backhaul' && <BackhaulTab data={data} onSelect={handleSelect} />}
      {activeTab === 'matrix' && <MatrixTab data={data} />}
    </div>
  </>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
